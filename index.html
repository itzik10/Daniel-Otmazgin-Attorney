<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דניאל אוטמזגין - משרד עורכי דין כפר סבא</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #101e36;
            --gold-accent: #b89551;
            --soft-white: #f8f9fa;
        }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0; padding: 0; background-color: #fff; color: #333; line-height: 1.6;
        }

        header {
            background-color: var(--dark-blue);
            color: white; padding: 80px 20px; text-align: center;
            border-bottom: 5px solid var(--gold-accent);
        }

        header h1 { margin: 0; font-size: 3rem; font-weight: 700; letter-spacing: 1px; }
        header p { margin: 10px 0 0; font-size: 1.3rem; font-weight: 300; opacity: 0.9; }

        .container { max-width: 800px; margin: -60px auto 40px; padding: 0 20px; }

        /* עיצוב התמונה של דניאל */
        .profile-img-container {
            text-align: center; margin-bottom: -50px; position: relative; z-index: 2;
        }
        .profile-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid var(--gold-accent);
            object-fit: cover; /* זה מסיר את השוליים השחורים ומתמקד בפנים */
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .form-card {
            background: white; padding: 70px 40px 40px; /* פדינג עליון גדול בגלל התמונה */
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; z-index: 1;
        }

        .form-card h2 { text-align: center; color: var(--dark-blue); margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 700; color: var(--dark-blue); }
        input, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;
            font-size: 16px; box-sizing: border-box; font-family: inherit;
        }
        
        input:focus { border-color: var(--gold-accent); outline: none; }

        button {
            width: 100%; background-color: var(--dark-blue); color: white;
            padding: 18px; border: none; border-radius: 4px;
            font-size: 1.2rem; font-weight: 700; cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: var(--gold-accent); transform: translateY(-2px); }

        .features { display: flex; justify-content: space-around; margin-top: 50px; gap: 20px; text-align: center; }
        .feature-item h3 { color: var(--gold-accent); border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .footer { text-align: center; padding: 40px; background: var(--soft-white); margin-top: 50px; color: #666; }
    </style>
</head>
<body>

<header>
    <h1>דניאל אוטמזגין</h1>
    <p>עורך דין ונוטריון בכפר סבא</p>
</header>

<div class="container">
    <div class="profile-img-container">
        <img src="Daniel.jpg" alt="עו ד דניאל אוטמזגין" class="profile-img">
    </div>

    <div class="form-card">
        <h2>צרו קשר לייעוץ ראשוני</h2>
        
        <form action="https://script.google.com/macros/s/AKfycbyFLcs5FOFZPQhYWBECws5JXD4GqkFDXrzP90ER3XGmLk7PDvMjXCTxj_xX8ckIQv1X/exec" method="POST">
            <div class="form-group">
                <label>שם מלא</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>טלפון</label>
                <input type="tel" name="phone" required>
            </div>
            <div class="form-group">
                <label>תעודת זהות</label>
                <input type="text" name="id_number">
            </div>
            <div class="form-group">
                <label>הודעה</label>
                <textarea name="message" rows="3"></textarea>
            </div>
            <button type="submit">שליחת פרטים</button>
        </form>
    </div>

    <div class="features">
        <div class="feature-item">
            <h3>מקצועיות</h3>
            <p>ניסיון רב בערכאות המשפטיות השונות.</p>
        </div>
        <div class="feature-item">
            <h3>זמינות</h3>
            <p>מענה אישי ומהיר לכל לקוח בכפר סבא והסביבה.</p>
        </div>
    </div>
</div>

<div class="footer">
    © 2026 משרד עורכי דין דניאל אוטמזגין | רחוב ויצמן, כפר סבא
</div>

</body>
</html>
